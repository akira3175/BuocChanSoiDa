version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: always
    env_file:
      - ./.env.dev
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./../init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mysql_data:
name: CI

on:
  push:
    branches: [main, master, testing]
  pull_request:
    branches: [main, master, testing]

jobs:
  backend-tests:
    name: Django API tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests — critical (API / DB)
        run: |
          python manage.py test core.tests tours.tests payments.tests.test_api_critical \
            --settings=config.settings_test -v 2

      - name: Run tests — optional (PayPal env check)
        continue-on-error: true
        run: |
          python manage.py test payments.tests.test_optional \
            --settings=config.settings_test -v 2

  frontend-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (required for vite preview)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E — critical (blocks on failure)
        run: npm run test:e2e

      - name: Run E2E — optional (informational; does not fail the job)
        continue-on-error: true
        run: npm run test:e2e:optional

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

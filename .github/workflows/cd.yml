name: CD (Deploy Docker)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /home/ubuntu/BuocChanSoiDa

            # Update code to the latest main
            git fetch origin main
            # If `main` doesn't exist locally on the EC2 box yet, create it from `origin/main`.
            git checkout -B main origin/main

            # Build + restart the production stack
            docker compose up -d --build --remove-orphans

            # Run DB migrations inside the backend container
            docker compose exec -T backend python manage.py migrate --noinput


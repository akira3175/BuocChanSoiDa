name: CD (Deploy Docker)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /home/ubuntu/BuocChanSoiDa

            # Fetch the latest `main`. Some environments may not populate `origin/main`,
            # so we always create the local `main` branch from `FETCH_HEAD`.
            git fetch origin main --prune
            git checkout -B main FETCH_HEAD

            docker compose -f docker-compose.yml up -d --build --remove-orphans
            docker compose -f docker-compose.yml exec -T backend python manage.py migrate --noinput


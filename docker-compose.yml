services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Must be set at build time for Vite (import.meta.env.VITE_API_URL)
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    env_file:
      - ./frontend/.env
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped


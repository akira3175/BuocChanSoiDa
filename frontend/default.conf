server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: if the file doesn't exist, serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Better caching for fingerprinted assets
  location ~* \.(?:css|js|woff2|png|jpg|jpeg|gif|svg|ico)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}

